name: Translate Podcast

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Podcast/YouTube URL'
        required: true
        type: string

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip install -U yt-dlp

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup YouTube cookies
        run: echo "${{ secrets.YT_COOKIES_B64 }}" | base64 -d > /tmp/cookies.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_AUTH_TOKEN: ${{ secrets.HF_AUTH_TOKEN }}
          YT_COOKIES_PATH: /tmp/cookies.txt
        run: python src/main.py "${{ inputs.url }}"

      - name: Upload MP3
        uses: actions/upload-artifact@v4
        with:
          name: translated-audio
          path: output/audio/*.mp3
          retention-days: 30

      - name: Upload script
        uses: actions/upload-artifact@v4
        with:
          name: translated-script
          path: output/scripts/*.json
          retention-days: 30
