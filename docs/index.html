<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcast Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      margin-bottom: 32px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input[type="url"], input[type="password"] {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #666; }
    input::placeholder { color: #555; }
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .btn-sm {
      padding: 10px 16px;
      font-size: 14px;
      background: #333;
    }
    .btn-sm:hover { background: #444; }
    .btn-danger { background: #991b1b; }
    .btn-danger:hover { background: #b91c1c; }
    #status {
      padding: 16px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #222;
      font-size: 0.9rem;
      line-height: 1.6;
      display: none;
    }
    #status.visible { display: block; }
    .status-line { padding: 4px 0; color: #aaa; }
    .status-line.active { color: #e0e0e0; }
    .status-line.done { color: #22c55e; }
    .status-line.error { color: #ef4444; }
    .download-link {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 20px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .setup {
      margin-bottom: 24px;
      padding: 16px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 12px;
    }
    .setup label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }
    .setup .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .connected {
      font-size: 0.8rem;
      color: #22c55e;
      margin-bottom: 24px;
      text-align: center;
    }
    .connected button {
      margin-left: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      background: #333;
      border-radius: 6px;
    }
    .history {
      margin-top: 32px;
      width: 100%;
    }
    .history h2 {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 12px;
    }
    .history-item {
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .history-item .title { color: #e0e0e0; }
    .history-item .meta { color: #666; margin-top: 4px; }
    .history-item .meta a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Podcast Translator</h1>
    <p class="subtitle">URLを貼るだけで日本語に翻訳</p>

    <!-- PAT 設定（未設定時のみ表示） -->
    <div class="setup" id="setup">
      <label>GitHub Personal Access Token</label>
      <div class="row">
        <input type="password" id="pat-input" placeholder="github_pat_...">
        <button class="btn-sm" onclick="savePat()">保存</button>
      </div>
    </div>

    <!-- 接続済み表示 -->
    <div class="connected" id="connected" style="display:none;">
      GitHub 接続済み
      <button onclick="clearPat()">解除</button>
    </div>

    <!-- URL 入力 -->
    <div class="input-group">
      <input type="url" id="url-input" placeholder="YouTube / Podcast URL" autocomplete="off">
      <button id="submit-btn" onclick="submitUrl()">翻訳</button>
    </div>

    <div id="status"></div>

    <div class="history" id="history" style="display:none;">
      <h2>履歴</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    const REPO = 'silverbuckle/podcast-translator';
    const WORKFLOW = 'translate.yml';
    const GH_API = 'https://api.github.com';

    // --- PAT 管理 ---
    function getPat() { return localStorage.getItem('gh_pat') || ''; }

    function savePat() {
      const pat = document.getElementById('pat-input').value.trim();
      if (!pat) return;
      localStorage.setItem('gh_pat', pat);
      updateUI();
    }

    function clearPat() {
      localStorage.removeItem('gh_pat');
      updateUI();
    }

    function updateUI() {
      const hasPat = !!getPat();
      document.getElementById('setup').style.display = hasPat ? 'none' : 'block';
      document.getElementById('connected').style.display = hasPat ? 'block' : 'none';
      document.getElementById('submit-btn').disabled = !hasPat;
    }

    // --- GitHub API ---
    async function ghFetch(path, options = {}) {
      const resp = await fetch(`${GH_API}${path}`, {
        ...options,
        headers: {
          'Authorization': `Bearer ${getPat()}`,
          'Accept': 'application/vnd.github.v3+json',
          ...options.headers,
        },
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`GitHub API ${resp.status}: ${text.slice(0, 200)}`);
      }
      // 204 No Content (workflow_dispatch の成功レスポンス)
      if (resp.status === 204) return null;
      return resp.json();
    }

    // --- メイン ---
    async function submitUrl() {
      const url = document.getElementById('url-input').value.trim();
      if (!url || !getPat()) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const status = document.getElementById('status');
      status.className = 'visible';
      status.innerHTML = '<div class="status-line active">... ワークフロー起動中</div>';

      try {
        // 1. workflow_dispatch をトリガー
        await ghFetch(`/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: 'main', inputs: { url } }),
        });

        // 2. 少し待ってから run_id を取得
        await sleep(3000);
        const runs = await ghFetch(
          `/repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=1`
        );
        const runId = runs.workflow_runs?.[0]?.id;
        const runUrl = runs.workflow_runs?.[0]?.html_url || '#';

        status.innerHTML = `
          <div class="status-line done">OK ワークフロー起動</div>
          <div class="status-line active">... 処理中 (<a href="${runUrl}" target="_blank" style="color:#2563eb">ログ</a>)</div>
        `;

        // 3. ポーリング
        if (runId) pollStatus(runId, url);

      } catch (e) {
        status.innerHTML = `<div class="status-line error">NG ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '翻訳';
      }
    }

    async function pollStatus(runId, inputUrl) {
      const status = document.getElementById('status');

      while (true) {
        await sleep(15000);
        try {
          const data = await ghFetch(`/repos/${REPO}/actions/runs/${runId}`);
          const runUrl = data.html_url || '#';

          if (data.status === 'completed') {
            if (data.conclusion === 'success') {
              // アーティファクト取得
              const arts = await ghFetch(
                `/repos/${REPO}/actions/runs/${runId}/artifacts`
              );
              status.innerHTML = `
                <div class="status-line done">OK 完了!</div>
                <a class="download-link" href="${runUrl}" target="_blank">MP3 をダウンロード</a>
                <div style="margin-top:8px;font-size:0.8rem;color:#888;">
                  Actions ページ下部の Artifacts から translated-audio をダウンロード
                </div>
              `;
              addToHistory(inputUrl, { runUrl });
            } else {
              status.innerHTML = `
                <div class="status-line error">NG 処理失敗: ${data.conclusion}</div>
                <div style="margin-top:8px;font-size:0.8rem;">
                  <a href="${runUrl}" target="_blank" style="color:#2563eb;">ログを確認</a>
                </div>
              `;
            }
            return;
          }
          // まだ実行中
        } catch (e) {
          // ネットワークエラーは無視して継続
        }
      }
    }

    // --- 履歴 ---
    function addToHistory(url, data) {
      const history = JSON.parse(localStorage.getItem('history') || '[]');
      history.unshift({
        url,
        date: new Date().toISOString(),
        runUrl: data.runUrl,
        artifactUrl: data.artifactUrl,
      });
      localStorage.setItem('history', JSON.stringify(history.slice(0, 20)));
      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('history') || '[]');
      if (history.length === 0) return;

      document.getElementById('history').style.display = 'block';
      document.getElementById('history-list').innerHTML = history.map(item => `
        <div class="history-item">
          <div class="title">${item.url.length > 50 ? item.url.slice(0, 50) + '...' : item.url}</div>
          <div class="meta">
            ${new Date(item.date).toLocaleDateString('ja-JP')}
            ${item.runUrl ? `<a href="${item.runUrl}" target="_blank">ログ</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    // --- ユーティリティ ---
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // iOS 共有メニューからの URL 受取
    const params = new URLSearchParams(location.search);
    if (params.get('url')) {
      document.getElementById('url-input').value = params.get('url');
    }

    // Enter キーで送信
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitUrl();
    });

    // 初期化
    updateUI();
    renderHistory();
  </script>
</body>
</html>
